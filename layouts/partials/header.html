<a href="#main-content" class="skip-link">דלג לתוכן</a>

<header class="site-header" role="banner">
  <div class="container">
    <div class="site-header__inner">
      <a href="{{ "/" | relURL }}" class="site-logo">{{ .Site.Title }}</a>

      <button class="nav-toggle-btn"
              aria-expanded="false"
              aria-controls="main-nav"
              aria-label="פתח תפריט ניווט">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav id="main-nav" class="site-nav" aria-label="ניווט ראשי">
        <ul class="site-nav__list" role="list">
          <li>
            <a href="{{ "/" | relURL }}" class="site-nav__link"
              {{ if .IsHome }}aria-current="page"{{ end }}>בית</a>
          </li>
          <li>
            <a href="{{ "/stories/" | relURL }}" class="site-nav__link"
              {{ if eq .Section "stories" }}aria-current="page"{{ end }}>סיפורים</a>
          </li>
          <li>
            <a href="{{ "/about/" | relURL }}" class="site-nav__link"
              {{ if eq .RelPermalink "/about/" }}aria-current="page"{{ end }}>אודות</a>
          </li>
        </ul>
      </nav>
    </div>
  </div>
</header>

<script>
(function () {
  var btn = document.querySelector('.nav-toggle-btn');
  var nav = document.getElementById('main-nav');
  if (!btn || !nav) return;
  var open = false;
  btn.addEventListener('click', function () {
    open = !open;
    btn.setAttribute('aria-expanded', open);
    btn.setAttribute('aria-label', open ? 'סגור תפריט ניווט' : 'פתח תפריט ניווט');
    nav.classList.toggle('is-open', open);
  });
}());
</script>
