<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} · {{ .Site.Title }}{{ end }}</title>

{{- $desc := .Params.description | default .Site.Params.description -}}

<link rel="canonical" href="{{ .Permalink }}">
<link rel="alternate" hreflang="he" href="{{ .Permalink }}">
<meta name="description" content="{{ $desc }}">

<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:title" content="{{ .Title }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:url" content="{{ .Permalink }}">
{{ with .Params.cover }}
<meta property="og:image" content="{{ . | absURL }}">
{{ end }}
<meta property="og:locale" content="he_IL">
<meta property="og:site_name" content="{{ .Site.Title }}">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700&display=swap&subset=hebrew" rel="stylesheet">
{{ if .IsPage }}
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;700&display=swap&subset=hebrew" rel="stylesheet">
{{ end }}

{{ $css := resources.Get "css/main.css" | css.Build (dict "minify" true) | fingerprint }}
<link rel="stylesheet" href="{{ $css.RelPermalink }}">
